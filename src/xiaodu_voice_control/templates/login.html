<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>小度授权登录</title>
  <style>
    body { font-family: "Segoe UI", "PingFang SC", sans-serif; background: #f6f9fc; margin: 0; }
    .wrap { max-width: 420px; margin: 48px auto; background: #fff; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,.08); padding: 28px; }
    h1 { font-size: 22px; margin: 0 0 12px; color: #1f9d55; text-align: center; }
    p { color: #555; line-height: 1.6; }
    label { display: block; margin: 16px 0 8px; font-weight: 600; color: #333; }
    input { width: 100%; box-sizing: border-box; padding: 12px 14px; border: 1px solid #d9e2ec; border-radius: 10px; font-size: 16px; }
    button { width: 100%; margin-top: 22px; border: 0; border-radius: 10px; background: #22c55e; color: #fff; padding: 14px 16px; font-size: 16px; cursor: pointer; }
    .msg { margin-top: 14px; color: #d14343; min-height: 24px; }
    .hint { font-size: 13px; color: #7b8794; margin-top: 18px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>小度授权登录</h1>
    <p>你正在授权 <strong>__CLIENT_ID__</strong> 访问你的 Home Assistant 语音控制网关。</p>
    <form id="login-form">
      <label for="username">用户名</label>
      <input id="username" name="username" type="text" autocomplete="username" required>
      <label for="password">密码</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>
      <button type="submit">登录并授权</button>
      <div id="msg" class="msg"></div>
    </form>
    <div class="hint">默认可使用本服务自己的绑定账号；如果启用了 HA 登录模式，也可以使用 HA 用户名密码。</div>
  </div>
  <script>
    const form = document.getElementById('login-form');
    const msg = document.getElementById('msg');
    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      msg.textContent = '';
      const data = new FormData(form);
      const response = await fetch(window.location.href, { method: 'POST', body: data });
      const payload = await response.json();
      if (payload.code === 'ok' && payload.data && payload.data.location) {
        window.location.href = payload.data.location;
        return;
      }
      msg.textContent = payload.Msg || payload.detail || '授权失败';
    });
  </script>
</body>
</html>
